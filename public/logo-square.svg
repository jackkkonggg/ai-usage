<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- Apple-style dark background -->
  <rect width="512" height="512" rx="115" fill="#0f0f0f"/>

  <!-- "AI" text: gradient fill, visually centered -->
  <!-- font-size=240, cap-height≈173px, baseline=256+87=343 so text center=256 -->
  <text
    x="256"
    y="320"
    font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="240"
    font-weight="800"
    text-anchor="middle"
    fill="url(#textGrad)"
  >AI</text>

  <!-- 5 small ascending bars below text, left-to-right -->
  <!-- total width: 5*38 + 4*10 = 230, start x=(512-230)/2=141 -->
  <rect x="141" y="443" width="38" height="17" rx="5" fill="#f59e0b" fill-opacity="0.4"/>
  <rect x="189" y="430" width="38" height="30" rx="5" fill="#f59e0b" fill-opacity="0.55"/>
  <rect x="237" y="415" width="38" height="45" rx="5" fill="#f59e0b" fill-opacity="0.7"/>
  <rect x="285" y="397" width="38" height="63" rx="5" fill="#f97316" fill-opacity="0.85"/>
  <rect x="333" y="376" width="38" height="84" rx="5" fill="#f97316"/>
</svg>
